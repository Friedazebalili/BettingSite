<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentic Perya Drop Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* --- 3D Scene Setup --- */
        .scene {
            perspective: 1200px;
            width: 100%;
            max-width: 500px;
            height: 450px;
            position: relative;
            margin-top: 20px;
        }

        /* The Wooden Table */
        .table-board {
            position: absolute;
            bottom: -50px;
            left: 5%;
            width: 90%;
            height: 400px;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.4)), 
                        repeating-linear-gradient(90deg, #c29b62 0px, #a87f43 15px, #c29b62 30px);
            transform: rotateX(65deg);
            transform-origin: bottom center;
            border: 15px solid #6b4c2a;
            border-bottom: 30px solid #4a331a;
            box-shadow: 0 -30px 50px rgba(0,0,0,0.8) inset, 0 20px 30px rgba(0,0,0,0.9);
            border-radius: 10px;
        }

        /* The Top Cyan Box */
        .top-box {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 90px;
            background-color: #ffcc00; /* Inside yellow */
            border: 12px solid #00bcd4; /* Cyan border */
            border-bottom: none; /* Open at the bottom */
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), inset 0 10px 20px rgba(0,0,0,0.5);
            z-index: 20;
        }

        /* The Lid/Funnel flap */
        .box-flap {
            position: absolute;
            bottom: -20px;
            left: -12px;
            width: calc(100% + 24px);
            height: 30px;
            background-color: #00bcd4;
            transform-origin: top;
            transform: rotateX(40deg);
            z-index: 21;
        }

        /* --- Dice Mechanics --- */
        .dice-container {
            position: absolute;
            top: 20px; /* Hidden inside the box */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 15;
        }

        /* Handles the drop trajectory (Y-axis and scaling) */
        .die-translator {
            transform: translateY(0px) scale(0.4);
            /* Fast drop, bounces at the bottom */
            transition: transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Handles the spinning (3D rotations) */
        .cube {
            width: 50px;
            height: 50px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(0deg) rotateY(0deg);
            transition: transform 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .cube__face {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 3px solid #222;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
            border-radius: 4px;
        }

        /* Dice Colors */
        .cube__face--front  { transform: rotateY(  0deg) translateZ(25px); background: #ff0000; } /* Red */
        .cube__face--back   { transform: rotateY(180deg) translateZ(25px); background: #00ff00; } /* Green */
        .cube__face--right  { transform: rotateY( 90deg) translateZ(25px); background: #0000ff; } /* Blue */
        .cube__face--left   { transform: rotateY(-90deg) translateZ(25px); background: #ffff00; } /* Yellow */
        .cube__face--top    { transform: rotateX( 90deg) translateZ(25px); background: #ff00ff; } /* Pink */
        .cube__face--bottom { transform: rotateX(-90deg) translateZ(25px); background: #ffffff; } /* White */


        /* --- UI & Controls --- */
        .betting-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            background: #111;
            padding: 10px;
            border: 5px solid #00bcd4;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            margin-top: 10px;
            z-index: 30;
        }

        .color-btn {
            height: 70px;
            cursor: pointer;
            border: 3px solid #000;
            border-radius: 6px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .color-btn:active { transform: scale(0.95); }
        
        .bet-badge {
            background: rgba(0,0,0,0.8);
            color: white;
            font-weight: black;
            font-size: 1.2rem;
            padding: 4px 10px;
            border-radius: 20px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .bg-yellow { background-color: #ffff00; }
        .bg-white  { background-color: #ffffff; }
        .bg-pink   { background-color: #ff00ff; }
        .bg-blue   { background-color: #0000ff; }
        .bg-red    { background-color: #ff0000; }
        .bg-green  { background-color: #00ff00; }

    </style>
</head>
<body>

    <div class="w-full max-w-md flex justify-between items-center px-6 mt-4 z-30 relative bg-black/50 p-3 rounded-xl border border-gray-700">
        <div>
            <p class="text-[10px] text-gray-400 uppercase font-bold">Wallet</p>
            <p class="text-xl font-black text-green-400">₱<span id="balance">1000</span></p>
        </div>
        <h2 id="status-text" class="text-yellow-400 font-bold text-center uppercase tracking-wider text-sm w-32">Place Bets</h2>
        <div class="text-right">
            <p class="text-[10px] text-gray-400 uppercase font-bold">Bet</p>
            <p class="text-xl font-black text-white">₱<span id="current-bet">0</span></p>
        </div>
    </div>

    <div class="scene">
        <div class="table-board"></div>
        
        <div class="top-box">
            <div class="box-flap"></div>
        </div>

        <div class="dice-container">
            <div class="die-translator" id="trans1">
                <div class="cube" id="die1">
                    <div class="cube__face cube__face--front"></div><div class="cube__face cube__face--back"></div>
                    <div class="cube__face cube__face--right"></div><div class="cube__face cube__face--left"></div>
                    <div class="cube__face cube__face--top"></div><div class="cube__face cube__face--bottom"></div>
                </div>
            </div>
            <div class="die-translator" id="trans2">
                <div class="cube" id="die2">
                    <div class="cube__face cube__face--front"></div><div class="cube__face cube__face--back"></div>
                    <div class="cube__face cube__face--right"></div><div class="cube__face cube__face--left"></div>
                    <div class="cube__face cube__face--top"></div><div class="cube__face cube__face--bottom"></div>
                </div>
            </div>
            <div class="die-translator" id="trans3">
                <div class="cube" id="die3">
                    <div class="cube__face cube__face--front"></div><div class="cube__face cube__face--back"></div>
                    <div class="cube__face cube__face--right"></div><div class="cube__face cube__face--left"></div>
                    <div class="cube__face cube__face--top"></div><div class="cube__face cube__face--bottom"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="betting-board">
        <div class="color-btn bg-yellow" data-color="yellow"></div>
        <div class="color-btn bg-white" data-color="white"></div>
        <div class="color-btn bg-pink" data-color="pink"></div>
        <div class="color-btn bg-blue" data-color="blue"></div>
        <div class="color-btn bg-red" data-color="red"></div>
        <div class="color-btn bg-green" data-color="green"></div>
    </div>

    <div class="mt-4 flex gap-3 w-full max-w-md px-4 z-30 pb-6">
        <button id="clear-btn" class="flex-1 bg-gray-800 text-gray-300 font-bold py-4 rounded-xl border border-gray-600 uppercase text-sm">Clear</button>
        <button id="pull-btn" class="flex-[2] bg-cyan-500 hover:bg-cyan-400 text-black font-black text-xl py-4 rounded-xl border-b-4 border-cyan-700 uppercase shadow-[0_0_20px_rgba(0,188,212,0.5)]">
            PULL
        </button>
    </div>

    <script>
        let balance = 1000;
        let isRolling = false;
        const betUnit = 50;
        const bets = { yellow: 0, white: 0, pink: 0, blue: 0, red: 0, green: 0 };

        const colorFaces = [
            { name: 'red',    x: 0,   y: 0 },
            { name: 'green',  x: 0,   y: 180 },
            { name: 'blue',   x: 0,   y: -90 },
            { name: 'yellow', x: 0,   y: 90 },
            { name: 'pink',   x: -90, y: 0 },
            { name: 'white',  x: 90,  y: 0 }
        ];

        const uiBalance = document.getElementById('balance');
        const uiBet = document.getElementById('current-bet');
        const uiStatus = document.getElementById('status-text');
        const btns = document.querySelectorAll('.color-btn');

        // Physics elements
        const translators = [
            document.getElementById('trans1'),
            document.getElementById('trans2'),
            document.getElementById('trans3')
        ];
        const cubes = [
            document.getElementById('die1'),
            document.getElementById('die2'),
            document.getElementById('die3')
        ];

        // Betting System
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isRolling) return;
                if (balance >= betUnit) {
                    bets[btn.dataset.color] += betUnit;
                    balance -= betUnit;
                    updateUI();
                } else {
                    uiStatus.textContent = "NO FUNDS";
                    uiStatus.className = "text-red-500 font-bold text-center uppercase tracking-wider text-sm w-32";
                }
            });
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            if (isRolling) return;
            balance += Object.values(bets).reduce((a, b) => a + b, 0);
            for (let c in bets) bets[c] = 0;
            updateUI();
        });

        function updateUI() {
            uiBalance.textContent = balance;
            uiBet.textContent = Object.values(bets).reduce((a, b) => a + b, 0);
            
            btns.forEach(btn => {
                const color = btn.dataset.color;
                const oldBadge = btn.querySelector('.bet-badge');
                if (oldBadge) oldBadge.remove();
                if (bets[color] > 0) {
                    const badge = document.createElement('div');
                    badge.className = 'bet-badge';
                    badge.textContent = bets[color];
                    btn.appendChild(badge);
                }
            });
        }

        // PULL Mechanics (Drop and Spin)
        document.getElementById('pull-btn').addEventListener('click', () => {
            const totalBet = Object.values(bets).reduce((a, b) => a + b, 0);
            if (totalBet === 0) {
                uiStatus.textContent = "BET FIRST";
                uiStatus.className = "text-red-400 font-bold text-center uppercase tracking-wider text-sm w-32";
                return;
            }
            if (isRolling) return;

            isRolling = true;
            uiStatus.textContent = "ROLLING...";
            uiStatus.className = "text-cyan-400 font-bold text-center uppercase tracking-wider text-sm w-32 animate-pulse";

            // 1. Instantly pull dice back inside the cyan box
            translators.forEach((t, i) => {
                t.style.transition = 'none';
                t.style.transform = 'translateY(0px) scale(0.4)';
                cubes[i].style.transition = 'none';
                cubes[i].style.transform = 'rotateX(0deg) rotateY(0deg)';
            });

            // 2. Wait a split second, then apply the Drop & Roll physics
            setTimeout(() => {
                const results = [];

                translators.forEach((t, i) => {
                    const randomFace = colorFaces[Math.floor(Math.random() * colorFaces.length)];
                    results.push(randomFace.name);

                    // Add random tumbling rotations (multiples of 360)
                    const extraSpinsX = (4 + i + Math.floor(Math.random() * 3)) * 360;
                    const extraSpinsY = (4 + i + Math.floor(Math.random() * 3)) * 360;

                    // Spread them out slightly on the table
                    const spreadX = (i - 1) * 80 + (Math.random() * 20 - 10);
                    // Drop distance onto the table
                    const dropY = 320 + Math.random() * 40;

                    // Restore transitions
                    // Translators bounce down
                    t.style.transition = `transform ${1.3 + (i * 0.2)}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
                    t.style.transform = `translateX(${spreadX}px) translateY(${dropY}px) scale(1.2)`;

                    // Cubes spin while dropping
                    cubes[i].style.transition = `transform ${1.3 + (i * 0.2)}s cubic-bezier(0.2, 0.9, 0.3, 1)`;
                    cubes[i].style.transform = `rotateX(${randomFace.x + extraSpinsX}deg) rotateY(${randomFace.y + extraSpinsY}deg)`;
                });

                // 3. Calculate winnings after the longest animation finishes
                setTimeout(() => {
                    calculateWinnings(results);
                    isRolling = false;
                }, 1800);

            }, 50); // Small delay to ensure the reset frame renders
        });

        function calculateWinnings(results) {
            let winnings = 0;
            let resultCounts = { yellow: 0, white: 0, pink: 0, blue: 0, red: 0, green: 0 };
            results.forEach(color => resultCounts[color]++);

            Object.keys(bets).forEach(color => {
                if (bets[color] > 0 && resultCounts[color] > 0) {
                    winnings += bets[color] + (bets[color] * resultCounts[color]);
                }
            });

            if (winnings > 0) {
                balance += winnings;
                uiStatus.textContent = `WON ₱${winnings}`;
                uiStatus.className = "text-green-400 font-black text-center uppercase tracking-wider text-sm w-32";
            } else {
                uiStatus.textContent = "HOUSE WINS";
                uiStatus.className = "text-red-500 font-bold text-center uppercase tracking-wider text-sm w-32";
            }

            for (let c in bets) bets[c] = 0;
            updateUI();
        }
    </script>
</body>
</html>
