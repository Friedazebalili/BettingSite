<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perya Premium | Neon Color Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #0a0a0c, #020617);
            min-height: 100vh;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .bet-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .bet-card:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
        }
        
        .bet-card:active {
            transform: translateY(0);
        }

        .dice-box {
            transition: all 0.1s ease;
        }

        .rolling {
            animation: shake 0.4s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-2deg); }
            50% { transform: translate(-3px, 0px) rotate(2deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(-2deg); }
        }

        /* Perya Colors */
        .color-red { background-color: #ef4444; }
        .color-green { background-color: #22c55e; }
        .color-blue { background-color: #3b82f6; }
        .color-yellow { background-color: #eab308; }
        .color-pink { background-color: #ec4899; }
        .color-white { background-color: #f8fafc; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-6">

    <!-- Header Section -->
    <header class="text-center mb-8">
        <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tighter mb-2" style="text-shadow: 0 0 10px rgba(59, 130, 246, 0.8);">
            PERYA<span class="text-blue-500">PREMIUM</span>
        </h1>
        <p class="text-gray-400 uppercase tracking-widest text-xs">High-Stakes Color Drop</p>
    </header>

    <main class="glass-panel rounded-3xl p-6 sm:p-8 w-full max-w-3xl">
        
        <!-- Status Bar -->
        <div class="flex justify-between items-center mb-8 pb-4 border-b border-white/10">
            <div>
                <span class="text-gray-500 text-xs font-bold uppercase tracking-wider block">Balance</span>
                <span class="text-3xl font-mono font-bold text-green-400">₱<span id="balance">1000</span></span>
            </div>
            <div class="text-right">
                <span class="text-gray-500 text-xs font-bold uppercase tracking-wider block">Total Bet</span>
                <span class="text-3xl font-mono font-bold text-blue-400">₱<span id="total-bet">0</span></span>
            </div>
        </div>

        <!-- The 3 Dice Display -->
        <div class="flex justify-center gap-4 sm:gap-8 mb-10">
            <div id="die1" class="dice-box w-20 h-20 sm:w-28 sm:h-28 rounded-2xl glass-panel neon-border flex items-center justify-center bg-gray-800 shadow-2xl"></div>
            <div id="die2" class="dice-box w-20 h-20 sm:w-28 sm:h-28 rounded-2xl glass-panel neon-border flex items-center justify-center bg-gray-800 shadow-2xl"></div>
            <div id="die3" class="dice-box w-20 h-20 sm:w-28 sm:h-28 rounded-2xl glass-panel neon-border flex items-center justify-center bg-gray-800 shadow-2xl"></div>
        </div>

        <div class="text-center mb-4 h-6">
            <span id="result-message" class="text-sm font-bold tracking-widest uppercase text-yellow-400">Place your bets</span>
        </div>

        <!-- Betting Board -->
        <div class="grid grid-cols-3 gap-3 sm:gap-4 mb-8">
            <!-- Rendered via JS to keep HTML clean -->
            <div class="bet-card rounded-xl h-24 sm:h-32 color-red shadow-lg border border-white/20" data-color="red">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-xs tracking-wider mb-1">Red</span>
                    <span class="bet-amount text-2xl font-black text-white" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 sm:h-32 color-green shadow-lg border border-white/20" data-color="green">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-xs tracking-wider mb-1">Green</span>
                    <span class="bet-amount text-2xl font-black text-white" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 sm:h-32 color-blue shadow-lg border border-white/20" data-color="blue">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-xs tracking-wider mb-1">Blue</span>
                    <span class="bet-amount text-2xl font-black text-white" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 sm:h-32 color-yellow shadow-lg border border-white/20" data-color="yellow">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-xs tracking-wider mb-1">Yellow</span>
                    <span class="bet-amount text-2xl font-black text-gray-900" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 sm:h-32 color-pink shadow-lg border border-white/20" data-color="pink">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-xs tracking-wider mb-1">Pink</span>
                    <span class="bet-amount text-2xl font-black text-white" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 sm:h-32 color-white shadow-lg border border-gray-400" data-color="white">
                <div class="absolute inset-0 bg-black/10 flex flex-col items-center justify-center">
                    <span class="text-gray-600 font-bold uppercase text-xs tracking-wider mb-1">White</span>
                    <span class="bet-amount text-2xl font-black text-gray-900" data-amount="0"></span>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col sm:flex-row gap-4 justify-between items-center">
            <button id="clear-btn" class="w-full sm:w-auto px-6 py-3 rounded-xl glass-panel hover:bg-white/10 transition-all font-bold text-sm uppercase text-gray-300">Clear Bets</button>
            <button id="roll-btn" class="w-full sm:w-auto px-10 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 transition-all font-black text-lg uppercase shadow-[0_0_20px_rgba(59,130,246,0.6)] text-white">ROLL DICE</button>
        </div>
    </main>

    <footer class="mt-8 text-gray-600 text-sm">
        &copy; 2026 Blue_Dev Design Architecture. All rights reserved.
    </footer>

    <script>
        // Game State
        let balance = 1000;
        let bets = { red: 0, green: 0, blue: 0, yellow: 0, pink: 0, white: 0 };
        const colors = ['red', 'green', 'blue', 'yellow', 'pink', 'white'];
        const betUnit = 50; // Amount added per click
        let isRolling = false;

        // DOM Elements
        const balanceEl = document.getElementById('balance');
        const totalBetEl = document.getElementById('total-bet');
        const resultMessage = document.getElementById('result-message');
        const betCards = document.querySelectorAll('.bet-card');
        const diceEls = [document.getElementById('die1'), document.getElementById('die2'), document.getElementById('die3')];
        const rollBtn = document.getElementById('roll-btn');
        const clearBtn = document.getElementById('clear-btn');

        // Betting Logic
        betCards.forEach(card => {
            card.addEventListener('click', () => {
                if (isRolling) return;
                
                if (balance >= betUnit) {
                    const color = card.dataset.color;
                    bets[color] += betUnit;
                    balance -= betUnit;
                    updateUI();
                } else {
                    resultMessage.textContent = "INSUFFICIENT BALANCE";
                    resultMessage.className = "text-sm font-bold tracking-widest uppercase text-red-500";
                }
            });
        });

        clearBtn.addEventListener('click', () => {
            if (isRolling) return;
            // Return bets to balance
            let total = Object.values(bets).reduce((a, b) => a + b, 0);
            balance += total;
            // Reset bets
            Object.keys(bets).forEach(k => bets[k] = 0);
            resultMessage.textContent = "BETS CLEARED";
            resultMessage.className = "text-sm font-bold tracking-widest uppercase text-gray-400";
            updateUI();
        });

        // Rolling Logic
        rollBtn.addEventListener('click', () => {
            const totalBet = Object.values(bets).reduce((a, b) => a + b, 0);
            if (totalBet === 0) {
                resultMessage.textContent = "PLACE A BET FIRST";
                resultMessage.className = "text-sm font-bold tracking-widest uppercase text-red-500";
                return;
            }
            if (isRolling) return;

            isRolling = true;
            resultMessage.textContent = "ROLLING...";
            resultMessage.className = "text-sm font-bold tracking-widest uppercase text-blue-400";
            
            // Add animation classes
            diceEls.forEach(die => die.classList.add('rolling'));

            // Simulate dice rolling with interval
            let rollInterval = setInterval(() => {
                diceEls.forEach(die => {
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    die.className = `dice-box w-20 h-20 sm:w-28 sm:h-28 rounded-2xl glass-panel neon-border flex items-center justify-center shadow-2xl rolling color-${randomColor}`;
                });
            }, 100);

            // Stop rolling after 1.5 seconds
            setTimeout(() => {
                clearInterval(rollInterval);
                diceEls.forEach(die => die.classList.remove('rolling'));
                
                // Final Results
                const results = [
                    colors[Math.floor(Math.random() * colors.length)],
                    colors[Math.floor(Math.random() * colors.length)],
                    colors[Math.floor(Math.random() * colors.length)]
                ];

                diceEls.forEach((die, index) => {
                    die.className = `dice-box w-20 h-20 sm:w-28 sm:h-28 rounded-2xl glass-panel neon-border flex items-center justify-center shadow-2xl color-${results[index]}`;
                });

                calculateWinnings(results);
                isRolling = false;
            }, 1500);
        });

        function calculateWinnings(results) {
            let winnings = 0;
            let resultCounts = { red: 0, green: 0, blue: 0, yellow: 0, pink: 0, white: 0 };
            
            // Count how many times each color appeared
            results.forEach(color => resultCounts[color]++);

            // Calculate payouts
            Object.keys(bets).forEach(color => {
                if (bets[color] > 0 && resultCounts[color] > 0) {
                    // You get your original bet back PLUS the bet amount * number of dice matched
                    winnings += bets[color] + (bets[color] * resultCounts[color]);
                }
            });

            if (winnings > 0) {
                balance += winnings;
                resultMessage.innerHTML = `YOU WON <span class="text-green-400">₱${winnings}</span>!`;
                resultMessage.className = "text-sm font-bold tracking-widest uppercase text-white";
            } else {
                resultMessage.textContent = "HOUSE WINS. TRY AGAIN!";
                resultMessage.className = "text-sm font-bold tracking-widest uppercase text-red-500";
            }

            // Reset bets for next round
            Object.keys(bets).forEach(k => bets[k] = 0);
            updateUI();
        }

        function updateUI() {
            balanceEl.textContent = balance;
            const total = Object.values(bets).reduce((a, b) => a + b, 0);
            totalBetEl.textContent = total;

            betCards.forEach(card => {
                const color = card.dataset.color;
                const amountEl = card.querySelector('.bet-amount');
                if (bets[color] > 0) {
                    amountEl.textContent = `₱${bets[color]}`;
                } else {
                    amountEl.textContent = "";
                }
            });
        }
    </script>
</body>
</html>
