<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perya Drop | Premium Color Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top, #0a0a0c, #020617);
            min-height: 100vh;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.6);
        }

        .bet-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .bet-card:hover {
            transform: translateY(-4px);
            filter: brightness(1.2);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* --- Physics & Drop Animations --- */
        .dice-tray {
            position: relative;
            height: 260px; /* Space for the vertical drop */
            perspective: 1000px;
        }

        .funnel-top {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 20px;
            background: linear-gradient(to bottom, #1e293b, transparent);
            border-radius: 50%;
            border-top: 2px solid rgba(59, 130, 246, 0.5);
            box-shadow: 0 -10px 20px rgba(59, 130, 246, 0.2);
        }

        .die {
            position: absolute;
            bottom: 20px; /* Resting Y position */
            opacity: 1;
            transition: background-color 0.3s;
        }

        /* Die 1: Drops left */
        .die-1 { left: 20%; }
        .drop-1 { animation: physicsDrop1 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        
        /* Die 2: Drops center */
        .die-2 { left: 50%; transform: translateX(-50%); }
        .drop-2 { animation: physicsDrop2 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        
        /* Die 3: Drops right */
        .die-3 { right: 20%; }
        .drop-3 { animation: physicsDrop3 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        @keyframes physicsDrop1 {
            0% { transform: translate(100px, -300px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(0.5); opacity: 0; }
            15% { opacity: 1; }
            60% { transform: translate(-20px, 0px) rotateX(360deg) rotateY(180deg) rotateZ(180deg) scale(1.1); }
            75% { transform: translate(0px, -60px) rotateX(450deg) rotateY(220deg) rotateZ(220deg) scale(1); }
            90% { transform: translate(10px, 0px) rotateX(540deg) rotateY(360deg) rotateZ(360deg); }
            100% { transform: translate(0px, 0px) rotateX(720deg) rotateY(360deg) rotateZ(360deg); }
        }

        @keyframes physicsDrop2 {
            0% { transform: translate(0px, -300px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(0.5); opacity: 0; }
            15% { opacity: 1; }
            55% { transform: translate(0px, 0px) rotateX(-360deg) rotateY(180deg) rotateZ(-90deg) scale(1.1); }
            75% { transform: translate(0px, -80px) rotateX(-450deg) rotateY(270deg) rotateZ(-180deg) scale(1); }
            85% { transform: translate(0px, 0px) rotateX(-540deg) rotateY(360deg) rotateZ(-270deg); }
            95% { transform: translate(0px, -20px) rotateX(-600deg) rotateY(360deg) rotateZ(-360deg); }
            100% { transform: translate(0px, 0px) rotateX(-720deg) rotateY(360deg) rotateZ(-360deg); }
        }

        @keyframes physicsDrop3 {
            0% { transform: translate(-100px, -300px) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(0.5); opacity: 0; }
            15% { opacity: 1; }
            65% { transform: translate(20px, 0px) rotateX(360deg) rotateY(-180deg) rotateZ(90deg) scale(1.1); }
            80% { transform: translate(-10px, -50px) rotateX(540deg) rotateY(-270deg) rotateZ(180deg) scale(1); }
            90% { transform: translate(0px, 0px) rotateX(630deg) rotateY(-360deg) rotateZ(270deg); }
            100% { transform: translate(0px, 0px) rotateX(720deg) rotateY(-360deg) rotateZ(360deg); }
        }

        /* Colors */
        .color-red { background-color: #ef4444; }
        .color-green { background-color: #22c55e; }
        .color-blue { background-color: #3b82f6; }
        .color-yellow { background-color: #eab308; }
        .color-pink { background-color: #ec4899; }
        .color-white { background-color: #f8fafc; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <header class="text-center mb-6">
        <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tighter mb-1" style="text-shadow: 0 0 15px rgba(59, 130, 246, 0.8);">
            PERYA<span class="text-blue-500">DROP</span>
        </h1>
        <p class="text-blue-300/60 uppercase tracking-widest text-xs font-semibold">Gravity-Fed Color Match</p>
    </header>

    <main class="glass-panel rounded-3xl p-6 w-full max-w-3xl border-t-4 border-t-blue-500/50">
        
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-white/10">
            <div>
                <span class="text-gray-500 text-[10px] font-bold uppercase tracking-widest block">Bankroll</span>
                <span class="text-2xl font-mono font-bold text-green-400">₱<span id="balance">2000</span></span>
            </div>
            <div class="text-right">
                <span class="text-gray-500 text-[10px] font-bold uppercase tracking-widest block">Current Bet</span>
                <span class="text-2xl font-mono font-bold text-blue-400">₱<span id="total-bet">0</span></span>
            </div>
        </div>

        <!-- The Drop Tray -->
        <div class="dice-tray glass-panel rounded-2xl mb-8 border border-white/5 bg-black/40 overflow-hidden shadow-inner">
            <div class="funnel-top"></div>
            <!-- Dice elements -->
            <div id="die1" class="die die-1 w-20 h-20 sm:w-24 sm:h-24 rounded-2xl glass-panel neon-glow shadow-2xl flex items-center justify-center bg-gray-800"></div>
            <div id="die2" class="die die-2 w-20 h-20 sm:w-24 sm:h-24 rounded-2xl glass-panel neon-glow shadow-2xl flex items-center justify-center bg-gray-800"></div>
            <div id="die3" class="die die-3 w-20 h-20 sm:w-24 sm:h-24 rounded-2xl glass-panel neon-glow shadow-2xl flex items-center justify-center bg-gray-800"></div>
            
            <div class="absolute bottom-4 left-0 w-full text-center z-10 pointer-events-none">
                <span id="result-message" class="text-sm font-bold tracking-widest uppercase text-yellow-400 drop-shadow-md">Place your bets</span>
            </div>
        </div>

        <!-- Betting Grid -->
        <div class="grid grid-cols-3 gap-3 sm:gap-4 mb-8">
            <div class="bet-card rounded-xl h-24 color-red shadow-lg border border-red-400/30" data-color="red">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-[10px] tracking-widest mb-1">Red</span>
                    <span class="bet-amount text-2xl font-black text-white" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 color-green shadow-lg border border-green-400/30" data-color="green">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-[10px] tracking-widest mb-1">Green</span>
                    <span class="bet-amount text-2xl font-black text-white" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 color-blue shadow-lg border border-blue-400/30" data-color="blue">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-[10px] tracking-widest mb-1">Blue</span>
                    <span class="bet-amount text-2xl font-black text-white" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 color-yellow shadow-lg border border-yellow-400/30" data-color="yellow">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-yellow-900/80 font-bold uppercase text-[10px] tracking-widest mb-1">Yellow</span>
                    <span class="bet-amount text-2xl font-black text-gray-900" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 color-pink shadow-lg border border-pink-400/30" data-color="pink">
                <div class="absolute inset-0 bg-black/20 flex flex-col items-center justify-center">
                    <span class="text-white/80 font-bold uppercase text-[10px] tracking-widest mb-1">Pink</span>
                    <span class="bet-amount text-2xl font-black text-white" data-amount="0"></span>
                </div>
            </div>
            <div class="bet-card rounded-xl h-24 color-white shadow-lg border border-gray-300/50" data-color="white">
                <div class="absolute inset-0 bg-black/10 flex flex-col items-center justify-center">
                    <span class="text-gray-600 font-bold uppercase text-[10px] tracking-widest mb-1">White</span>
                    <span class="bet-amount text-2xl font-black text-gray-900" data-amount="0"></span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row gap-4">
            <button id="clear-btn" class="flex-1 px-6 py-4 rounded-xl glass-panel hover:bg-white/10 transition-all font-bold text-xs tracking-widest uppercase text-gray-300">Clear Table</button>
            <button id="roll-btn" class="flex-[2] px-6 py-4 rounded-xl bg-blue-600 hover:bg-blue-500 transition-all font-black text-lg tracking-wider uppercase shadow-[0_0_20px_rgba(59,130,246,0.6)] text-white relative overflow-hidden group">
                <div class="absolute inset-0 bg-white/20 transform -skew-x-12 -translate-x-full group-hover:translate-x-full transition-transform duration-500"></div>
                Release Dice
            </button>
        </div>
    </main>

    <footer class="mt-8 text-gray-500 text-xs tracking-widest uppercase">
        &copy; 2026 Blue_Dev UI/UX
    </footer>

    <script>
        let balance = 2000;
        let bets = { red: 0, green: 0, blue: 0, yellow: 0, pink: 0, white: 0 };
        const colors = ['red', 'green', 'blue', 'yellow', 'pink', 'white'];
        const betUnit = 100; // Increased bet unit for high-rollers
        let isDropping = false;

        const balanceEl = document.getElementById('balance');
        const totalBetEl = document.getElementById('total-bet');
        const resultMessage = document.getElementById('result-message');
        const betCards = document.querySelectorAll('.bet-card');
        const diceEls = [
            document.getElementById('die1'), 
            document.getElementById('die2'), 
            document.getElementById('die3')
        ];
        const rollBtn = document.getElementById('roll-btn');
        const clearBtn = document.getElementById('clear-btn');

        // Initial Dice Reset (hide them before first drop)
        diceEls.forEach(die => die.style.opacity = '0');

        betCards.forEach(card => {
            card.addEventListener('click', () => {
                if (isDropping) return;
                if (balance >= betUnit) {
                    const color = card.dataset.color;
                    bets[color] += betUnit;
                    balance -= betUnit;
                    updateUI();
                } else {
                    showMessage("Insufficient Funds", "text-red-500");
                }
            });
        });

        clearBtn.addEventListener('click', () => {
            if (isDropping) return;
            let total = Object.values(bets).reduce((a, b) => a + b, 0);
            balance += total;
            Object.keys(bets).forEach(k => bets[k] = 0);
            showMessage("Bets Cleared", "text-gray-400");
            updateUI();
        });

        rollBtn.addEventListener('click', () => {
            const totalBet = Object.values(bets).reduce((a, b) => a + b, 0);
            if (totalBet === 0) {
                showMessage("Place your bets first", "text-red-400");
                return;
            }
            if (isDropping) return;

            isDropping = true;
            showMessage("Dropping...", "text-blue-400");
            
            // Generate Results
            const results = [
                colors[Math.floor(Math.random() * colors.length)],
                colors[Math.floor(Math.random() * colors.length)],
                colors[Math.floor(Math.random() * colors.length)]
            ];

            // Trigger Physics Animation
            diceEls.forEach((die, index) => {
                // Reset animation by removing and re-adding class
                die.classList.remove(`drop-${index + 1}`);
                void die.offsetWidth; // Trigger reflow
                
                // Clear old colors
                colors.forEach(c => die.classList.remove(`color-${c}`));
                
                // Keep them dark during the tumble, reveal color near the end
                die.classList.add('bg-gray-800'); 
                die.classList.add(`drop-${index + 1}`);

                // Swap out the gray for the final color halfway through the drop
                setTimeout(() => {
                    die.classList.remove('bg-gray-800');
                    die.classList.add(`color-${results[index]}`);
                }, 800 + (index * 200)); // Stagger color reveal slightly
            });

            // Calculate winnings after the longest animation completes (~1.8s)
            setTimeout(() => {
                calculateWinnings(results);
                isDropping = false;
            }, 1900);
        });

        function calculateWinnings(results) {
            let winnings = 0;
            let resultCounts = { red: 0, green: 0, blue: 0, yellow: 0, pink: 0, white: 0 };
            
            results.forEach(color => resultCounts[color]++);

            Object.keys(bets).forEach(color => {
                if (bets[color] > 0 && resultCounts[color] > 0) {
                    winnings += bets[color] + (bets[color] * resultCounts[color]);
                }
            });

            if (winnings > 0) {
                balance += winnings;
                showMessage(`WINNER: ₱${winnings}`, "text-green-400");
            } else {
                showMessage("House wins. Try again.", "text-red-400");
            }

            Object.keys(bets).forEach(k => bets[k] = 0);
            updateUI();
        }

        function updateUI() {
            balanceEl.textContent = balance;
            totalBetEl.textContent = Object.values(bets).reduce((a, b) => a + b, 0);

            betCards.forEach(card => {
                const color = card.dataset.color;
                const amountEl = card.querySelector('.bet-amount');
                amountEl.textContent = bets[color] > 0 ? `₱${bets[color]}` : "";
            });
        }

        function showMessage(msg, colorClass) {
            resultMessage.textContent = msg;
            resultMessage.className = `text-sm font-bold tracking-widest uppercase drop-shadow-md ${colorClass}`;
        }
    </script>
</body>
</html>
