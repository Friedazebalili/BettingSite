<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaPulse | Premium Color Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #0a0a0c, #020617);
            min-height: 100vh;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.5);
        }

        .color-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .color-card:hover {
            transform: translateY(-5px) scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .active-glow {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <!-- Header Section -->
    <header class="text-center mb-12">
        <h1 class="text-5xl font-extrabold tracking-tighter active-glow mb-2">
            CHROMA<span class="text-blue-500">PULSE</span>
        </h1>
        <p class="text-gray-400 uppercase tracking-widest text-xs">High-Precision Color Matching</p>
    </header>

    <!-- Game Console -->
    <main class="glass-panel rounded-3xl p-8 w-full max-w-2xl">
        <div class="flex justify-between items-center mb-8">
            <div class="flex flex-col">
                <span class="text-gray-500 text-xs font-bold uppercase tracking-wider">Target RGB</span>
                <span id="color-display" class="text-3xl font-mono font-bold text-blue-400">RGB(???, ???, ???)</span>
            </div>
            <div class="text-right">
                <span class="text-gray-500 text-xs font-bold uppercase tracking-wider">Current Score</span>
                <div id="score" class="text-3xl font-bold">0</div>
            </div>
        </div>

        <!-- Grid Container -->
        <div id="container" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
            <!-- Squares generated by JS -->
        </div>

        <!-- Controls -->
        <div class="flex flex-col sm:flex-row gap-4 justify-between items-center pt-6 border-t border-white/10">
            <span id="message" class="text-blue-400 font-medium h-6"></span>
            <div class="flex gap-4">
                <button id="reset" class="px-6 py-2 rounded-full glass-panel hover:bg-white/10 transition-all font-bold text-sm uppercase">New Colors</button>
                <div class="flex bg-black/40 rounded-full p-1 border border-white/10">
                    <button id="easyBtn" class="px-4 py-1 rounded-full text-xs font-bold transition-all">EASY</button>
                    <button id="hardBtn" class="px-4 py-1 rounded-full text-xs font-bold bg-blue-600 shadow-lg">HARD</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-12 text-gray-600 text-sm">
        &copy; 2026 Blue_Dev Design Architecture. All rights reserved.
    </footer>

    <script>
        let numSquares = 6;
        let colors = [];
        let pickedColor;
        let score = 0;

        const squares = document.querySelectorAll(".square");
        const colorDisplay = document.getElementById("color-display");
        const messageDisplay = document.querySelector("#message");
        const h1 = document.querySelector("h1");
        const resetButton = document.querySelector("#reset");
        const modeButtons = document.querySelectorAll("[id$='Btn']");
        const container = document.querySelector("#container");
        const scoreDisplay = document.querySelector("#score");

        init();

        function init() {
            setupModeButtons();
            reset();
        }

        function setupModeButtons() {
            modeButtons.forEach(btn => {
                btn.addEventListener("click", function() {
                    modeButtons[0].classList.remove("bg-blue-600");
                    modeButtons[1].classList.remove("bg-blue-600");
                    this.classList.add("bg-blue-600");
                    this.textContent === "EASY" ? numSquares = 3 : numSquares = 6;
                    reset();
                });
            });
        }

        function reset() {
            colors = generateRandomColors(numSquares);
            pickedColor = pickColor();
            colorDisplay.textContent = pickedColor.toUpperCase();
            resetButton.textContent = "New Colors";
            messageDisplay.textContent = "";
            
            container.innerHTML = "";
            for (let i = 0; i < numSquares; i++) {
                const square = document.createElement("div");
                square.className = "color-card h-32 rounded-2xl glass-panel neon-border";
                square.style.backgroundColor = colors[i];
                square.addEventListener("click", function() {
                    const clickedColor = this.style.backgroundColor;
                    if (clickedColor === pickedColor) {
                        messageDisplay.textContent = "CORRECT MATCH";
                        changeColors(clickedColor);
                        resetButton.textContent = "Play Again?";
                        score += 10;
                        scoreDisplay.textContent = score;
                    } else {
                        this.style.opacity = "0";
                        messageDisplay.textContent = "TRY AGAIN";
                        score = Math.max(0, score - 5);
                        scoreDisplay.textContent = score;
                    }
                });
                container.appendChild(square);
            }
        }

        resetButton.addEventListener("click", function() {
            reset();
        });

        function changeColors(color) {
            const allSquares = document.querySelectorAll(".color-card");
            allSquares.forEach(sq => {
                sq.style.opacity = "1";
                sq.style.backgroundColor = color;
            });
        }

        function pickColor() {
            const random = Math.floor(Math.random() * colors.length);
            return colors[random];
        }

        function generateRandomColors(num) {
            const arr = [];
            for (let i = 0; i < num; i++) {
                arr.push(randomColor());
            }
            return arr;
        }

        function randomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return `rgb(${r}, ${g}, ${b})`;
        }
    </script>
</body>
</html>
